<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Workspace | VLAD Sonix</title>
    <style>
        :root {
            --bg: #000000;
            --ai-bubble: #1a1a1a;
            --user-bubble: #00ff41;
            --text-ai: #00ff41;
            --text-user: #000000;
            --accent: #00ff41;
            --drawer-w: 280px;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0; background-color: var(--bg);
            font-family: 'Inter', sans-serif;
            display: flex; height: 100vh;
            color: white; overflow: hidden;
        }

        /* --- SIDEBAR --- */
        #sidebar {
            position: fixed;
            top: 0; left: calc(-1 * var(--drawer-w) - 20px); 
            width: var(--drawer-w); height: 100vh;
            background: var(--ai-bubble);
            border-right: 1px solid var(--accent);
            transition: left 0.4s cubic-bezier(0.77, 0, 0.175, 1), visibility 0.4s;
            z-index: 1000; padding: 80px 20px;
            display: flex; flex-direction: column; gap: 15px;
            visibility: hidden;
        }
        .menu-open #sidebar { left: 0; visibility: visible; }

        .menu-item {
            padding: 15px; border: 1px solid transparent;
            border-radius: 12px; color: var(--accent);
            cursor: pointer; transition: 0.2s; font-size: 0.9rem;
        }
        .menu-item:hover { background: rgba(0, 255, 65, 0.1); border-color: var(--accent); }

        /* --- MODAL --- */
        #info-modal {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 90%; max-width: 400px;
            background: rgba(26, 26, 26, 0.98);
            border: 1px solid var(--accent);
            padding: 30px; border-radius: 25px;
            z-index: 2000; display: none; opacity: 0;
            transition: 0.3s; text-align: center;
            backdrop-filter: blur(15px);
        }
        #info-modal.active { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }

        /* --- MENU BUTTON --- */
        .menu-btn {
            position: fixed; top: 20px; left: 20px;
            width: 45px; height: 45px; background: var(--ai-bubble);
            border: 1px solid var(--accent); border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; gap: 4px; cursor: pointer; z-index: 1100;
            transition: left 0.4s cubic-bezier(0.77, 0, 0.175, 1);
        }
        .line { width: 18px; height: 2px; background: var(--accent); border-radius: 2px; transition: 0.3s; }
        .open .line:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .open .line:nth-child(2) { opacity: 0; }
        .open .line:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

        /* --- CHAT AREA --- */
        #main-content { flex: 1; display: flex; flex-direction: column; width: 100%; }
        #chat-window { flex: 1; overflow-y: auto; padding: 80px 20px 20px; display: flex; flex-direction: column; gap: 15px; }

        .bubble { max-width: 75%; padding: 14px 20px; font-size: 0.95rem; border-radius: 22px; }
        .ai { align-self: flex-start; background: var(--ai-bubble); color: var(--text-ai); border: 1px solid var(--accent); border-bottom-left-radius: 5px; }
        .user { align-self: flex-end; background: var(--user-bubble); color: var(--text-user); font-weight: 600; border-bottom-right-radius: 5px; white-space: pre-wrap; }

        /* --- FILE CHIPS --- */
        #file-list { display: flex; flex-wrap: wrap; gap: 5px; max-width: 850px; margin: 0 auto 10px; padding: 0 25px; }
        .file-chip {
            background: var(--ai-bubble); border: 1px solid var(--accent);
            color: var(--accent); font-size: 0.75rem; padding: 5px 12px;
            border-radius: 15px; display: flex; align-items: center; gap: 5px;
        }

        /* --- INPUT PILL --- */
        .input-container { padding: 10px 25px 25px; width: 100%; }
        .input-bubble {
            background: var(--ai-bubble); border: 1px solid var(--accent);
            border-radius: 35px; display: flex; align-items: center;
            padding: 8px 15px; max-width: 850px; margin: 0 auto; gap: 10px;
        }

        .plus-btn {
            background: transparent; border: 1.5px solid var(--accent);
            color: var(--accent); width: 32px; height: 32px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.2rem; cursor: pointer; flex-shrink: 0; transition: 0.2s;
        }
        .plus-btn:hover { background: var(--accent); color: #000; }

        input[type="text"] { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 1rem; }
        .send-btn { background: var(--user-bubble); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-weight: bold; flex-shrink: 0; }

        #file-upload { display: none; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 900; }
        .menu-open #overlay { display: block; }
    </style>
</head>
<body id="app-body">

    <div id="overlay" onclick="toggleMenu()"></div>

    <!-- Modal -->
    <div id="info-modal">
        <h3 style="color: var(--accent); margin-top:0;">System Information</h3>
        <p style="font-size: 0.9rem; line-height: 1.6; color: #ccc;">
            This AI was developed by <b>VLAD Sonix</b>.<br><br>
            Our artificial intelligence systems are currently undergoing maintenance and upgrades over the coming months.<br><br>
            If you are interested in collaborating, contact me on Instagram:
        </p>
        <a href="https://www.instagram.com/youngvladd?igsh=M2JtOGptc2M4b3p0" target="_blank" style="color: var(--accent); text-decoration: none; font-weight: bold;">@youngvladd</a>
        <br><br>
        <button onclick="toggleModal()" style="background: var(--accent); border:none; padding:10px 20px; border-radius:20px; cursor:pointer; font-weight:bold;">Close</button>
    </div>

    <!-- Sidebar -->
    <nav id="sidebar">
        <h2 style="color: var(--accent); font-size: 1rem; border-bottom: 1px solid var(--accent); padding-bottom: 10px; margin-top: 0;">VLAD SONIX</h2>
        <div class="menu-item">✦ New Session</div>
        <div class="menu-item" onclick="toggleModal()">ⓘ System Info</div>
        <div class="menu-item">⚙ Settings</div>
    </nav>

    <!-- Menu Toggle -->
    <div class="menu-btn" id="menuToggle" onclick="toggleMenu()">
        <div class="line"></div><div class="line"></div><div class="line"></div>
    </div>

    <div id="main-content">
        <div id="chat-window">
            <div class="bubble ai">Systems operational. You can now upload 1-5 files using the "+" button.</div>
        </div>

        <div class="input-container">
            <!-- Selected files preview -->
            <div id="file-list"></div>

            <div class="input-bubble">
                <button class="plus-btn" onclick="document.getElementById('file-upload').click()">+</button>
                <input type="file" id="file-upload" multiple onchange="handleFiles(this)">
                
                <input type="text" id="userInput" placeholder="Message VLAD Sonix..." onkeypress="if(event.key==='Enter') sendMsg()">
                <button class="send-btn" onclick="sendMsg()">↑</button>
            </div>
        </div>
    </div>

    <script>
        let selectedFiles = [];

        function toggleMenu() {
            document.getElementById('app-body').classList.toggle('menu-open');
            document.getElementById('menuToggle').classList.toggle('open');
        }

        function toggleModal() {
            const modal = document.getElementById('info-modal');
            const isVisible = modal.style.display === 'block';
            modal.style.display = isVisible ? 'none' : 'block';
            setTimeout(() => modal.classList.toggle('active'), 10);
            if(!isVisible && document.getElementById('app-body').classList.contains('menu-open')) toggleMenu();
        }

        function handleFiles(input) {
            const list = document.getElementById('file-list');
            const files = Array.from(input.files);

            if (files.length > 5) {
                alert("Please select between 1 and 5 files.");
                input.value = "";
                return;
            }

            selectedFiles = files;
            list.innerHTML = "";
            selectedFiles.forEach(file => {
                const chip = document.createElement('div');
                chip.className = 'file-chip';
                chip.innerHTML = `📎 ${file.name.substring(0, 12)}${file.name.length > 12 ? '...' : ''}`;
                list.appendChild(chip);
            });
        }

        function sendMsg() {
            const chat = document.getElementById('chat-window');
            const input = document.getElementById('userInput');
            const list = document.getElementById('file-list');

            if (input.value.trim() === "" && selectedFiles.length === 0) return;

            const msg = document.createElement('div');
            msg.className = "bubble user";
            
            let filesDisplay = selectedFiles.map(f => `[FILE: ${f.name}]`).join("\n");
            msg.innerText = (filesDisplay ? filesDisplay + "\n" : "") + input.value;
            
            chat.appendChild(msg);

            // Reset
            input.value = "";
            selectedFiles = [];
            list.innerHTML = "";
            document.getElementById('file-upload').value = "";
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
